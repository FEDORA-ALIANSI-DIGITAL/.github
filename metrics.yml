name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Update setiap jam
  push: {branches: ["master", "main"]}
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FEDORA-ALIANSI-DIGITAL
          template: classic
          base: header, repositories, metadata
          config_timezone: Asia/Jakarta
          # Ini kunci buat deteksi Private Repos:
          config_order: active, commits, released, metadata
          repositories_batch: 100
          # Pilih apa saja yang mau ditampilin:
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
