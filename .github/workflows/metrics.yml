name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Update otomatis setiap jam
  workflow_dispatch: # Bisa dijalankan manual
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Kunci rahasia yang kamu taruh di Settings > Secrets > Actions
          token: ${{ METRICS_TOKEN_FEDORA }} 
          
          # Target organisasi kamu
          user: FEDORA-ALIANSI-DIGITAL
          template: classic
          base: header, repositories, metadata
          config_timezone: Asia/Jakarta
          
          # --- PLUGIN BAHASA ---
          plugin_languages: yes
          plugin_languages_ignored: html, css # Opsional: abaikan bahasa dekorasi
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          
          # --- PLUGIN KOTAK KONTRIBUSI (Isocalendar) ---
          # Ini yang bikin tampilan kayak screenshot yang kamu mau
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Tampilkan 6 bulan terakhir
          
          # --- PLUGIN AKTIVITAS & GARIS ---
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_lines: yes
          plugin_followup: yes