name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Update otomatis setiap jam
  workflow_dispatch: # Bisa dijalankan manual
  push: {branches: ["main"]} # Branch harus sesuai, di screenshot kamu 'main'
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FEDORA-ALIANSI-DIGITAL
          template: classic
          base: header, repositories, metadata
          config_timezone: Asia/Jakarta
          23
          # Grafik Bahasa Kustom (Per Repo)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # Grafik Aktivitas (Mendeteksi Commit & Pull Requests)
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # Contribution Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year