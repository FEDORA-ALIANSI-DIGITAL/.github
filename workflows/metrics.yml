name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Kunci utama buat baca repo private
          user: FEDORA-ALIANSI-DIGITAL
          template: classic
          base: header, repositories, metadata
          config_timezone: Asia/Jakarta
          
          # Setup agar mirip dengan 'Summary Cards'
          plugin_languages: yes
          plugin_languages_type: byte-size
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Setup grafik aktivitas (Ganti Activity Graph)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          
          # Setup Line Chart (Garis Commit)
          plugin_lines: yes